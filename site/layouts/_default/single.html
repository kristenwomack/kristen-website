{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
  <article>
    <h1>{{ .Title }}</h1>
    {{ if eq .Section "blog" }}<p class="post-meta">{{ .Date.Format "January 2, 2006" }}</p>{{ end }}
    <div>{{ .Content }}</div>
    {{ with .Params.source_url }}<footer><p>Source: <a href="{{ . }}">{{ . }}</a></p></footer>{{ end }}
  </article>
{{ end }}
