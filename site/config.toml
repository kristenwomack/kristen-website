baseURL = "https://kristenwomack.github.io/"
languageCode = "en-us"
title = "Kristen Womack"
contentDir = "pages"

[params]
  author = "Kristen Womack"
  description = "Kristen Womack is a product leader and technologist. She writes about APIs, developer experience, agentic systems, and platform strategy."

[outputs]
  home = ["HTML", "RSS"]

disableKinds = ["taxonomy", "taxonomyTerm"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[permalinks]
  talks = "/talks/:year/:month/:slug/"
  papers = "/papers/:year/:month/:slug/"
  blog = "/blog/:year/:month/:slug/"
